<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JacketSearch - BEMANI Quiz Solver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">

        <main class="main-content">
            <div class="panel vision-panel">
                <div class="panel-header" style="display: flex; flex-direction: row; justify-content: space-between; align-items: center; padding: 0.5rem; gap: 0.5rem; flex-wrap: nowrap; overflow-x: auto;">
                    <div class="mask-buttons" id="mask-buttons" style="display: flex; gap: 0.25rem; align-items: center;">
                        <span style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted);">Dots:</span>
                        <button class="btn outline-btn" data-mask="1-dot" style="padding: 0.2rem 0.5rem; font-size: 0.8rem; min-width: auto;">1</button>
                        <button class="btn outline-btn" data-mask="3-dot" style="padding: 0.2rem 0.5rem; font-size: 0.8rem; min-width: auto;">3</button>
                        <button class="btn primary-btn" data-mask="5-dot" style="padding: 0.2rem 0.5rem; font-size: 0.8rem; min-width: auto;">5</button>
                    </div>
                    
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <button id="refresh-camera-btn" class="btn outline-btn" style="padding: 0.3rem 0.5rem; font-size: 1.1rem; border: 1px solid var(--border);" title="Refresh Camera">🔄</button>
                        <button id="settings-btn" class="btn outline-btn" style="padding: 0.3rem 0.5rem; font-size: 1.1rem; border: 1px solid var(--border);" title="Settings">⚙️</button>
                    </div>
                </div>
                <div class="video-wrapper">
                    <video id="webcam-video" autoplay playsinline muted></video>
                    <canvas id="overlay-canvas"></canvas>
                    <div id="loading-overlay" class="overlay flex-center">
                        <div class="spinner"></div>
                        <p id="loading-text">Initializing...</p>
                    </div>
                    <div id="status-overlay" class="overlay-text hidden"></div>
                </div>
                <div id="exposure-container" style="display: none; justify-content: center; align-items: center; padding: 0.5rem; gap: 0.5rem; background: var(--bg-secondary); border-top: 1px solid var(--border); border-bottom-left-radius: var(--radius); border-bottom-right-radius: var(--radius);">
                    <span style="font-size: 1.2rem;" title="Exposure Compensation">💡</span>
                    <input type="range" id="exposure-slider" min="-3" max="0" step="0.1" value="0" style="flex-grow: 1; max-width: 200px;">
                </div>
            </div>

            <div class="panel results-panel">
                <div class="panel-header" style="display: flex; flex-direction: row; justify-content: flex-end; padding: 0.5rem;">
                    <div class="controls">
                        <button id="freeze-btn" class="btn outline-btn" style="padding: 0.2rem 0.5rem; font-size: 0.8rem; min-width: auto;">Freeze</button>
                        <button id="clear-matches-btn" class="btn outline-btn" style="padding: 0.2rem 0.5rem; font-size: 0.8rem; min-width: auto;">Clear</button>
                    </div>
                </div>
                
                <div id="matches-list" class="matches-container">
                    <div class="empty-state">
                        <div class="empty-icon">⏳</div>
                        <p>Waiting for clear visual feed...</p>
                    </div>
                </div>
            </div>
        </main>

        <div id="settings-modal" class="overlay hidden" style="z-index: 100;">
            <div class="panel" style="width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 1rem;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2 style="font-family: 'Outfit', sans-serif; font-weight: 700;">Settings</h2>
                    <button id="close-settings-btn" class="btn outline-btn" style="padding: 0.2rem 0.5rem; font-size: 0.8rem; min-width: auto;">Close</button>
                </div>
                
                <div>
                    <label style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">Fade Fringes</label>
                    <div style="margin-top: 0.25rem;">
                        <button id="toggle-fade-btn" class="btn outline-btn" style="width: 100%;">Fade: OFF</button>
                    </div>
                </div>

                <div>
                    <label style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">Color Filter</label>
                    <div style="margin-top: 0.25rem;">
                        <button id="toggle-color-filter-btn" class="btn primary-btn" style="width: 100%;">Filter: ON</button>
                    </div>
                </div>

                <div>
                    <label style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">Camera Setup</label>
                    <div id="camera-list" style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.25rem;">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
