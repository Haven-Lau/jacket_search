<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JacketSearch - BEMANI Quiz Solver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🔍</span>
                    <h1>Jacket<span class="accent">Search</span></h1>
                </div>
                <p class="subtitle">BEMANI Dot-Reveal Quiz Solver</p>
            </div>
        </header>

        <main class="main-content">
            <div class="panel vision-panel">
                <div class="panel-header">
                    <h2>Live Vision Feed</h2>
                    <div class="controls">
                        <select id="mask-select" class="control-select">
                            <option value="5-dot">5-Dot Reveal</option>
                            <option value="3-dot">3-Dot Reveal</option>
                            <option value="1-dot">1-Dot Reveal</option>
                        </select>
                        <select id="camera-select" class="control-select">
                            <option value="">Loading cameras...</option>
                        </select>
                    </div>
                </div>
                <div class="video-wrapper">
                    <video id="webcam-video" autoplay playsinline muted></video>
                    <canvas id="overlay-canvas"></canvas>
                    <div id="loading-overlay" class="overlay flex-center">
                        <div class="spinner"></div>
                        <p id="loading-text">Initializing...</p>
                    </div>
                    <div id="status-overlay" class="overlay-text hidden"></div>
                </div>
                <div class="panel-footer">
                    <div class="upload-btn-wrapper">
                        <button class="btn primary-btn">Upload Test Image</button>
                        <input type="file" id="file-input" accept="image/*">
                    </div>
                    <p class="hint-text">Or point your camera at the screen</p>
                </div>
            </div>

            <div class="panel results-panel">
                <div class="panel-header">
                    <h2>Best Matches</h2>
                    <span class="badge" id="match-count-badge">0 DB</span>
                </div>
                
                <div id="matches-list" class="matches-container">
                    <div class="empty-state">
                        <div class="empty-icon">⏳</div>
                        <p>Waiting for clear visual feed...</p>
                    </div>
                </div>

                <div class="debug-section">
                    <h3>Diagnostics</h3>
                    <div class="debug-canvases">
                        <div class="debug-item">
                            <canvas id="debug-query-canvas" width="80" height="120"></canvas>
                            <span class="debug-label">Aligned Query</span>
                        </div>
                        <div class="debug-item">
                            <canvas id="debug-ref-canvas" width="80" height="120"></canvas>
                            <span class="debug-label">Reference Match</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
