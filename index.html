<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JacketSearch - BEMANI Quiz Solver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">

        <main class="main-content">
            <div class="panel vision-panel">
                <div class="panel-header">
                    <div class="header-left">
                        <h2>Live Vision Feed</h2>
                        <div class="upload-btn-wrapper" style="margin-left: 1rem;">
                            <button class="btn primary-btn btn-sm">Upload Image</button>
                            <input type="file" id="file-input" accept="image/*">
                        </div>
                    </div>
                    <div class="controls">
                        <div class="mask-buttons" id="mask-buttons" style="display: flex; gap: 0.5rem; align-items: center;">
                            <span style="font-size: 0.9rem; font-weight: 600; color: var(--text-muted);">Dots:</span>
                            <button class="btn outline-btn btn-sm" data-mask="1-dot">1</button>
                            <button class="btn outline-btn btn-sm" data-mask="3-dot">3</button>
                            <button class="btn primary-btn btn-sm" data-mask="5-dot">5</button>
                        </div>
                        <select id="camera-select" class="control-select">
                            <option value="">Loading cameras...</option>
                        </select>
                    </div>
                </div>
                <div class="video-wrapper">
                    <video id="webcam-video" autoplay playsinline muted></video>
                    <canvas id="overlay-canvas"></canvas>
                    <div id="loading-overlay" class="overlay flex-center">
                        <div class="spinner"></div>
                        <p id="loading-text">Initializing...</p>
                    </div>
                    <div id="status-overlay" class="overlay-text hidden"></div>
                </div>
            </div>

            <div class="panel results-panel">
                <div class="panel-header">
                    <h2>Best Matches</h2>
                    <div class="controls">
                        <button id="freeze-btn" class="btn outline-btn btn-sm">Freeze</button>
                        <button id="clear-matches-btn" class="btn outline-btn btn-sm">Clear</button>
                    </div>
                </div>
                
                <div id="matches-list" class="matches-container">
                    <div class="empty-state">
                        <div class="empty-icon">⏳</div>
                        <p>Waiting for clear visual feed...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
