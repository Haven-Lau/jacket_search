<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JacketSearch - BEMANI Quiz Solver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">

        <main class="main-content">
            <div class="panel vision-panel">
                <div class="panel-header" style="display: flex; flex-direction: row; justify-content: space-between; align-items: center; padding: 0.5rem; gap: 0.5rem; flex-wrap: nowrap; overflow-x: auto;">
                    <div class="mask-buttons" id="mask-buttons" style="display: flex; gap: 0.25rem; align-items: center;">
                        <span style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted);">Dots:</span>
                        <button class="btn outline-btn" data-mask="1-dot" style="padding: 0.2rem 0.5rem; font-size: 0.8rem; min-width: auto;">1</button>
                        <button class="btn outline-btn" data-mask="3-dot" style="padding: 0.2rem 0.5rem; font-size: 0.8rem; min-width: auto;">3</button>
                        <button class="btn primary-btn" data-mask="5-dot" style="padding: 0.2rem 0.5rem; font-size: 0.8rem; min-width: auto;">5</button>
                    </div>
                    
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <div style="position: relative; display: inline-block;">
                            <button class="btn outline-btn" style="padding: 0.3rem 0.5rem; font-size: 1.1rem; pointer-events: none; border: 1px solid var(--border);">📷</button>
                            <select id="camera-select" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
                                <option value="">Cameras...</option>
                            </select>
                        </div>
                        
                        <div class="upload-btn-wrapper" style="flex-shrink: 0; margin: 0; position: relative;">
                            <button class="btn primary-btn" style="padding: 0.3rem 0.5rem; font-size: 1.1rem; pointer-events: none;">📁</button>
                            <input type="file" id="file-input" accept="image/*" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
                        </div>
                    </div>
                </div>
                <div class="video-wrapper">
                    <video id="webcam-video" autoplay playsinline muted></video>
                    <canvas id="overlay-canvas"></canvas>
                    <div id="loading-overlay" class="overlay flex-center">
                        <div class="spinner"></div>
                        <p id="loading-text">Initializing...</p>
                    </div>
                    <div id="status-overlay" class="overlay-text hidden"></div>
                </div>
            </div>

            <div class="panel results-panel">
                <div class="panel-header" style="display: flex; flex-direction: row; justify-content: flex-end; padding: 0.5rem;">
                    <div class="controls">
                        <button id="freeze-btn" class="btn outline-btn" style="padding: 0.2rem 0.5rem; font-size: 0.8rem; min-width: auto;">Freeze</button>
                        <button id="clear-matches-btn" class="btn outline-btn" style="padding: 0.2rem 0.5rem; font-size: 0.8rem; min-width: auto;">Clear</button>
                    </div>
                </div>
                
                <div id="matches-list" class="matches-container">
                    <div class="empty-state">
                        <div class="empty-icon">⏳</div>
                        <p>Waiting for clear visual feed...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
